<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>Student Info Card Generator</h1>
    <div class="main-container">
        <div class="form-container">
            <label for="name">Student Name:</label>
            <input type="text" id="name" placeholder="Enter Your Name" />

            <label for="roll">Roll No:</label>
            <input type="text" id="roll" placeholder="Enter Your Roll No" />

            <label for="email">Student Email:</label>
            <input type="email" id="email" placeholder="Enter Your Email" />

            <label for="age">Student Age:</label>
            <input type="number" id="age" placeholder="Enter Your Age" />

            <label for="age">Gender:</label>
            <div class="radio-group">
                <label> <input type="radio" name="gender" value="Male">Male</label>
                <label> <input type="radio" name="gender" value="Female">Female</label>
            </div>

            <label for="age">Course:</label>
            <div class="checkbox-group">
                <label> <input type="checkbox" name="Web" value="Web">Web</label>
                <label> <input type="checkbox" name="DataScience" value="DataScience">DataScience</label>
            </div>

            <label for="marks">Marks:</label>
            <span id="marksvalue">50</span>/100
            <input type="range" id="marks" min="0" max="100" value="50" />

            <label for="photo">Upload Student Photo</label>
            <input type="file" id="photo" accept="image/*">
            <button type="button" id="Generatorbtn">Generate Card</button>
        </div>

        <!--card display-->
        <div class="card-container">
            <div class="student-card" id="studentcard">
                <img src="https://plus.unsplash.com/premium_photo-1726754461023-3a40e4fa9cda?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8c3R1ZGVudCUyMGZvcm18ZW58MHx8MHx8fDA%3D"
                    alt="Student Photo" class="student-photo" id="cardimage">

                <h2 id="cardname">Student Name</h2>

                <p id="cardroll">Roll No:</p>
                <p id="cardemail">Email:</p>
                <p id="cardage">Age:</p>
                <p id="cardgender">Gender:</p>
                <p id="cardcourse">Course:</p>
                <p id="cardmarks">Marks:</p>
            </div>
        </div>
        
    </div>
    <script src="script.js"></script>
</body>

</html>
